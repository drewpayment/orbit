# PostHog Celery worker + scheduler
apiVersion: apps/v1
kind: Deployment
metadata:
  name: posthog-worker
  namespace: orbit
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: worker
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: orbit
      containers:
        - name: worker
          image: posthog/posthog:latest@sha256:334b0b6a604d0cde5f48af199bac141b26f8867ed2f6fd77435cf859a9537d76
          command: ["./bin/docker-worker-celery", "--with-scheduler"]
          envFrom:
            - configMapRef:
                name: posthog-env
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: POSTHOG_SECRET_KEY
            - name: ENCRYPTION_SALT_KEYS
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: POSTHOG_ENCRYPTION_SALT_KEYS
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: POSTHOG_DB_PASSWORD
            - name: DATABASE_URL
              value: "postgres://posthog:$(PGPASSWORD)@posthog-db:5432/posthog"
            - name: OBJECT_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: MINIO_ROOT_USER
            - name: OBJECT_STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: SESSION_RECORDING_V2_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: MINIO_ROOT_USER
            - name: SESSION_RECORDING_V2_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: MINIO_ROOT_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 4Gi
            limits:
              memory: 20Gi
