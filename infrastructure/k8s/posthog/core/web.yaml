# PostHog web server (Django)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: posthog-web
  namespace: orbit
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: web
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: orbit
      containers:
        - name: web
          # Pinned to pre-WarpStream SHA — see jobs.yaml header comment.
          image: posthog/posthog:latest@sha256:334b0b6a604d0cde5f48af199bac141b26f8867ed2f6fd77435cf859a9537d76
          command: ["/bin/sh", "-c", "./bin/docker-server"]
          envFrom:
            - configMapRef:
                name: posthog-env
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: POSTHOG_SECRET_KEY
            - name: ENCRYPTION_SALT_KEYS
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: POSTHOG_ENCRYPTION_SALT_KEYS
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: POSTHOG_DB_PASSWORD
            - name: DATABASE_URL
              value: "postgres://posthog:$(PGPASSWORD)@posthog-db:5432/posthog"
            - name: OBJECT_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: MINIO_ROOT_USER
            - name: OBJECT_STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: SESSION_RECORDING_V2_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: MINIO_ROOT_USER
            - name: SESSION_RECORDING_V2_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: NGINX_UNIT_APP_PROCESSES
              value: "2"
          ports:
            - containerPort: 8000
              name: http
          startupProbe:
            httpGet:
              path: /_livez
              port: 8000
              httpHeaders:
                - name: Host
                  value: posthog.hoytlabs.app
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 45
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /_livez
              port: 8000
              httpHeaders:
                - name: Host
                  value: posthog.hoytlabs.app
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_readyz?role=web
              port: 8000
              httpHeaders:
                - name: Host
                  value: posthog.hoytlabs.app
            periodSeconds: 10
            timeoutSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 1200m
              memory: 4Gi
            limits:
              memory: 12Gi
---
apiVersion: v1
kind: Service
metadata:
  name: posthog-web
  namespace: orbit
spec:
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: web
