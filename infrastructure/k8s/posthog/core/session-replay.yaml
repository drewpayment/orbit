# PostHog session replay services
#
# Two services required for end-to-end session replay:
#
# 1. ingestion-sessionreplay — consumes recording snapshots from Kafka,
#    persists blobs to S3/MinIO (recordings-blob-ingestion-v2 mode)
#
# 2. recording-api — serves recording playback from S3/MinIO
#    (recording-api mode, port 6738)
#
# The capture side (replay-capture in capture.yaml) receives raw recording
# data at /s/ and writes to Kafka. These services handle everything after.
---
# Session replay ingestion — Kafka → S3
apiVersion: apps/v1
kind: Deployment
metadata:
  name: posthog-ingestion-replay
  namespace: orbit
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: ingestion-replay
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: ingestion-replay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: ingestion-replay
    spec:
      serviceAccountName: orbit
      containers:
        - name: ingestion-replay
          image: posthog/posthog-node:latest@sha256:863e76e040ad41aef79f605c33ec71f1529bddf94cfd88941c935da9bde97235
          command: ["node", "nodejs/dist/index.js"]
          envFrom:
            - configMapRef:
                name: posthog-env
          env:
            - name: PLUGIN_SERVER_MODE
              value: "recordings-blob-ingestion-v2"
            - name: DISABLE_MMDB
              value: "true"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: POSTHOG_SECRET_KEY
            - name: ENCRYPTION_SALT_KEYS
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: POSTHOG_ENCRYPTION_SALT_KEYS
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: POSTHOG_DB_PASSWORD
            - name: DATABASE_URL
              value: "postgres://posthog:$(PGPASSWORD)@posthog-db:5432/posthog"
            - name: OBJECT_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: MINIO_ROOT_USER
            - name: OBJECT_STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: SESSION_RECORDING_V2_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: MINIO_ROOT_USER
            - name: SESSION_RECORDING_V2_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: SESSION_RECORDING_V2_S3_TIMEOUT_MS
              value: "120000"
            - name: SESSION_RECORDING_API_REDIS_HOST
              value: "posthog-redis"
            - name: SESSION_RECORDING_API_REDIS_PORT
              value: "6379"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi
---
# Recording API — serves playback from S3
apiVersion: apps/v1
kind: Deployment
metadata:
  name: posthog-recording-api
  namespace: orbit
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: recording-api
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: recording-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: recording-api
    spec:
      serviceAccountName: orbit
      containers:
        - name: recording-api
          image: posthog/posthog-node:latest@sha256:863e76e040ad41aef79f605c33ec71f1529bddf94cfd88941c935da9bde97235
          command: ["node", "nodejs/dist/index.js"]
          envFrom:
            - configMapRef:
                name: posthog-env
          env:
            - name: PLUGIN_SERVER_MODE
              value: "recording-api"
            - name: DISABLE_MMDB
              value: "true"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: POSTHOG_SECRET_KEY
            - name: ENCRYPTION_SALT_KEYS
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: POSTHOG_ENCRYPTION_SALT_KEYS
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: POSTHOG_DB_PASSWORD
            - name: DATABASE_URL
              value: "postgres://posthog:$(PGPASSWORD)@posthog-db:5432/posthog"
            - name: OBJECT_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: MINIO_ROOT_USER
            - name: OBJECT_STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: SESSION_RECORDING_V2_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: MINIO_ROOT_USER
            - name: SESSION_RECORDING_V2_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: SESSION_RECORDING_V2_S3_TIMEOUT_MS
              value: "120000"
            - name: SESSION_RECORDING_API_REDIS_HOST
              value: "posthog-redis"
            - name: SESSION_RECORDING_API_REDIS_PORT
              value: "6379"
          ports:
            - containerPort: 6738
              name: http
          readinessProbe:
            httpGet:
              path: /_health
              port: 6738
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: posthog-recording-api
  namespace: orbit
spec:
  ports:
    - name: http
      port: 6738
      targetPort: 6738
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: recording-api
