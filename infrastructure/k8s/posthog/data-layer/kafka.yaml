# PostHog-dedicated Kafka (Redpanda) instance
apiVersion: v1
kind: PersistentVolume
metadata:
  name: orbit-posthog-kafka-pv
spec:
  capacity:
    storage: 20Gi
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: orbit-nfs
  nfs:
    server: 192.168.86.44
    path: /mnt/tank/appdata/orbit/posthog/kafka
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: posthog-kafka-data
  namespace: orbit
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: orbit-nfs
  resources:
    requests:
      storage: 20Gi
  volumeName: orbit-posthog-kafka-pv
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: posthog-kafka
  namespace: orbit
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  serviceName: posthog-kafka
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: kafka
    spec:
      serviceAccountName: orbit
      securityContext:
        fsGroup: 101
        runAsUser: 101
        runAsGroup: 101
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v25.1.9
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              rpk redpanda config set redpanda.auto_create_topics_enabled true &&
              rpk redpanda config set redpanda.empty_seed_starts_cluster true &&
              exec rpk redpanda start \
                --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092 \
                --advertise-kafka-addr internal://posthog-kafka:9092,external://localhost:19092 \
                --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082 \
                --advertise-pandaproxy-addr internal://posthog-kafka:8082,external://localhost:18082 \
                --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081 \
                --rpc-addr 0.0.0.0:33145 \
                --advertise-rpc-addr posthog-kafka:33145 \
                --smp 1 \
                --memory 1G \
                --reserve-memory 200M \
                --overprovisioned \
                --unsafe-bypass-fsync
          env:
            - name: ALLOW_PLAINTEXT_LISTENER
              value: "true"
          ports:
            - containerPort: 9092
              name: kafka
            - containerPort: 8081
              name: schema
            - containerPort: 8082
              name: proxy
            - containerPort: 9644
              name: admin
          livenessProbe:
            httpGet:
              path: /v1/status/ready
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              memory: 4Gi
          volumeMounts:
            - name: redpanda-data
              mountPath: /var/lib/redpanda/data
      volumes:
        - name: redpanda-data
          persistentVolumeClaim:
            claimName: posthog-kafka-data
---
apiVersion: v1
kind: Service
metadata:
  name: posthog-kafka
  namespace: orbit
spec:
  clusterIP: None
  ports:
    - port: 9092
      name: kafka
    - port: 8081
      name: schema
    - port: 8082
      name: proxy
    - port: 33145
      name: rpc
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: kafka
