# PostHog-dedicated Redis (Valkey) instance
apiVersion: v1
kind: PersistentVolume
metadata:
  name: orbit-posthog-redis-pv
spec:
  capacity:
    storage: 5Gi
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: orbit-nfs
  nfs:
    server: 192.168.86.44
    path: /mnt/tank/appdata/orbit/posthog/redis
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: posthog-redis-data
  namespace: orbit
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: orbit-nfs
  resources:
    requests:
      storage: 5Gi
  volumeName: orbit-posthog-redis-pv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: posthog-redis
  namespace: orbit
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: redis
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: redis
    spec:
      serviceAccountName: orbit
      containers:
        - name: redis
          image: valkey/valkey:8.0-alpine
          command: ["redis-server", "--maxmemory-policy", "allkeys-lru", "--maxmemory", "512mb"]
          ports:
            - containerPort: 6379
              name: redis
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 768Mi
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: posthog-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: posthog-redis
  namespace: orbit
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: redis
