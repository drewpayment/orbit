apiVersion: apps/v1
kind: Deployment
metadata:
  name: launches-worker-gcp
  namespace: orbit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: launches-worker-gcp
  template:
    metadata:
      labels:
        app: launches-worker-gcp
    spec:
      serviceAccountName: orbit
      containers:
        - name: launches-worker-gcp
          image: ghcr.io/drewpayment/orbit/launches-worker-gcp:latest
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal:7233
            - name: TEMPORAL_NAMESPACE
              value: default
            - name: TASK_QUEUE
              value: launches_gcp
            - name: PULUMI_BACKEND_URL
              value: s3://pulumi-state?endpoint=minio:9000&s3ForcePathStyle=true
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: GOOGLE_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: GOOGLE_CREDENTIALS
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            exec:
              command: ["ls", "/tmp"]
            initialDelaySeconds: 10
            periodSeconds: 30
