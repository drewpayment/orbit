apiVersion: apps/v1
kind: Deployment
metadata:
  name: launches-worker-azure
  namespace: orbit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: launches-worker-azure
  template:
    metadata:
      labels:
        app: launches-worker-azure
    spec:
      serviceAccountName: orbit
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: launches-worker-azure
          image: ghcr.io/drewpayment/orbit/launches-worker-azure:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal:7233
            - name: TEMPORAL_NAMESPACE
              value: default
            - name: TASK_QUEUE
              value: launches_azure
            - name: PULUMI_BACKEND_URL
              value: s3://pulumi-state?endpoint=minio:9000&s3ForcePathStyle=true
            - name: PULUMI_CONFIG_PASSPHRASE
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: PULUMI_CONFIG_PASSPHRASE
            - name: ORBIT_INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: ORBIT_INTERNAL_API_KEY
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: MINIO_ROOT_USER
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: AZURE_TENANT_ID
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: AZURE_CLIENT_ID
            - name: AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: AZURE_CLIENT_SECRET
            - name: AZURE_SUBSCRIPTION_ID
              valueFrom:
                secretKeyRef:
                  name: orbit-secrets
                  key: AZURE_SUBSCRIPTION_ID
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            exec:
              command: ["ls", "/tmp"]
            initialDelaySeconds: 10
            periodSeconds: 30
