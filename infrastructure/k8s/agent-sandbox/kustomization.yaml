apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Manifests applied at cluster setup time. The pod-template and
# networkpolicy-template files are NOT in resources because they're rendered
# per agent run by the temporal worker; they live here for the K8s
# SandboxExecutor to load and substitute placeholders.

resources:
  - namespace.yaml
  - rbac.yaml

commonLabels:
  app.kubernetes.io/part-of: orbit
  app.kubernetes.io/component: infrastructure-agent
