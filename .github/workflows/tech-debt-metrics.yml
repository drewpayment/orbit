name: Tech Debt Metrics

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  debt-metrics:
    name: Tech Debt Metrics
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Measure tech debt indicators
      id: metrics
      run: |
        echo "## Tech Debt Metrics" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Current | Baseline | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|---------|----------|--------|" >> $GITHUB_STEP_SUMMARY

        # --- In-memory repository stubs (kafka service) ---
        INMEM=$(grep -c "inMemory.*{}" services/kafka/cmd/server/main.go 2>/dev/null || echo "0")
        INMEM_BASELINE=18
        if [ "$INMEM" -gt "$INMEM_BASELINE" ]; then
          INMEM_STATUS="regression"
        elif [ "$INMEM" -lt "$INMEM_BASELINE" ]; then
          INMEM_STATUS="improved"
        else
          INMEM_STATUS="unchanged"
        fi
        echo "| In-memory stubs | $INMEM | $INMEM_BASELINE | $INMEM_STATUS |" >> $GITHUB_STEP_SUMMARY

        # --- `as any` casts (frontend) ---
        ASANY=$(grep -r "as any" orbit-www/src/ --include="*.ts" --include="*.tsx" 2>/dev/null | wc -l | tr -d ' ')
        ASANY_BASELINE=379
        if [ "$ASANY" -gt "$ASANY_BASELINE" ]; then
          ASANY_STATUS="regression"
        elif [ "$ASANY" -lt "$ASANY_BASELINE" ]; then
          ASANY_STATUS="improved"
        else
          ASANY_STATUS="unchanged"
        fi
        echo "| \`as any\` casts | $ASANY | $ASANY_BASELINE | $ASANY_STATUS |" >> $GITHUB_STEP_SUMMARY

        # --- .todo() skipped tests (frontend) ---
        TODO_TESTS=$(grep -r "\.todo(" orbit-www/src/ --include="*.ts" --include="*.tsx" 2>/dev/null | wc -l | tr -d ' ')
        TODO_TESTS_BASELINE=32
        if [ "$TODO_TESTS" -gt "$TODO_TESTS_BASELINE" ]; then
          TODO_TESTS_STATUS="regression"
        elif [ "$TODO_TESTS" -lt "$TODO_TESTS_BASELINE" ]; then
          TODO_TESTS_STATUS="improved"
        else
          TODO_TESTS_STATUS="unchanged"
        fi
        echo "| \`.todo()\` tests | $TODO_TESTS | $TODO_TESTS_BASELINE | $TODO_TESTS_STATUS |" >> $GITHUB_STEP_SUMMARY

        # --- Stubbed gRPC handlers (all services) ---
        STUBS=$(grep -r "status.Error.*codes.Unimplemented" services/ --include="*.go" 2>/dev/null | grep -v _test.go | wc -l | tr -d ' ')
        STUBS_BASELINE=10
        if [ "$STUBS" -gt "$STUBS_BASELINE" ]; then
          STUBS_STATUS="regression"
        elif [ "$STUBS" -lt "$STUBS_BASELINE" ]; then
          STUBS_STATUS="improved"
        else
          STUBS_STATUS="unchanged"
        fi
        echo "| Stubbed gRPC handlers | $STUBS | $STUBS_BASELINE | $STUBS_STATUS |" >> $GITHUB_STEP_SUMMARY

        # --- TODO/FIXME/HACK comments ---
        TODOS=$(grep -rE "TODO|FIXME|HACK" services/ orbit-www/src/ --include="*.go" --include="*.ts" --include="*.tsx" 2>/dev/null | wc -l | tr -d ' ')
        TODOS_BASELINE=157
        if [ "$TODOS" -gt "$TODOS_BASELINE" ]; then
          TODOS_STATUS="regression"
        elif [ "$TODOS" -lt "$TODOS_BASELINE" ]; then
          TODOS_STATUS="improved"
        else
          TODOS_STATUS="unchanged"
        fi
        echo "| TODO/FIXME/HACK | $TODOS | $TODOS_BASELINE | $TODOS_STATUS |" >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "_Baselines captured 2026-03-27 on \`feat/tech-debt-optimization\`._" >> $GITHUB_STEP_SUMMARY

        # --- Export for regression check ---
        echo "inmem=$INMEM" >> $GITHUB_OUTPUT
        echo "inmem_baseline=$INMEM_BASELINE" >> $GITHUB_OUTPUT
        echo "asany=$ASANY" >> $GITHUB_OUTPUT
        echo "asany_baseline=$ASANY_BASELINE" >> $GITHUB_OUTPUT
        echo "todo_tests=$TODO_TESTS" >> $GITHUB_OUTPUT
        echo "todo_tests_baseline=$TODO_TESTS_BASELINE" >> $GITHUB_OUTPUT
        echo "stubs=$STUBS" >> $GITHUB_OUTPUT
        echo "stubs_baseline=$STUBS_BASELINE" >> $GITHUB_OUTPUT
        echo "todos=$TODOS" >> $GITHUB_OUTPUT
        echo "todos_baseline=$TODOS_BASELINE" >> $GITHUB_OUTPUT

    - name: Check for regressions
      run: |
        FAILED=0

        check_regression() {
          local name="$1" current="$2" baseline="$3" threshold="$4"
          local limit=$((baseline + threshold))
          if [ "$current" -gt "$limit" ]; then
            echo "::error::$name regressed: $current (baseline: $baseline, threshold: +$threshold)"
            FAILED=1
          fi
        }

        check_regression "In-memory stubs" \
          "${{ steps.metrics.outputs.inmem }}" \
          "${{ steps.metrics.outputs.inmem_baseline }}" 0

        check_regression "as any casts" \
          "${{ steps.metrics.outputs.asany }}" \
          "${{ steps.metrics.outputs.asany_baseline }}" 5

        check_regression "todo tests" \
          "${{ steps.metrics.outputs.todo_tests }}" \
          "${{ steps.metrics.outputs.todo_tests_baseline }}" 0

        check_regression "Stubbed gRPC handlers" \
          "${{ steps.metrics.outputs.stubs }}" \
          "${{ steps.metrics.outputs.stubs_baseline }}" 0

        check_regression "TODO/FIXME/HACK" \
          "${{ steps.metrics.outputs.todos }}" \
          "${{ steps.metrics.outputs.todos_baseline }}" 5

        if [ "$FAILED" -eq 1 ]; then
          echo "::error::Tech debt regression detected. See metrics above."
          exit 1
        fi

        echo "All metrics within acceptable thresholds."
